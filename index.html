<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>KURUMA SHOP</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      letter-spacing: 2px;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price {
      color: #e60012;
      font-weight: bold;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>KURUMA SHOP</h1>
  <p>中古車・新車販売・買取</p>
</header>

<div class="hero">
  あなたにピッタリの一台を
</div>

<div class="container">

  <h2>おすすめ在庫</h2>

  <div class="card">
    <div>
      <h3>トヨタ プリウス</h3>
      <p>年式: 2020 / 走行距離: 30,000km</p>
    </div>
    <div class="price">¥1,800,000</div>
  </div>

  <div class="card">
    <div>
      <h3>ホンダ フィット</h3>
      <p>年式: 2019 / 走行距離: 25,000km</p>
    </div>
    <div class="price">¥1,200,000</div>
  </div>

  <div class="card">
    <div>
      <h3>日産 セレナ</h3>
      <p>年式: 2021 / 走行距離: 15,000km</p>
    </div>
    <div class="price">¥2,300,000</div>
  </div>

</div>

<footer>
  © 2026 KURUMA SHOP All Rights Reserved.
</footer>

</body>
</html>
